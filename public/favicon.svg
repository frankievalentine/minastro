<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0d0d12"/>
  <!-- 6-arm asterisk centered at (16,16), arms extend 9px from center -->
  <!-- Vertical arm: 0° -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Arms at 60° -->
  <line x1="23.79" y1="11.5" x2="8.21" y2="20.5" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Arms at 120° -->
  <line x1="23.79" y1="20.5" x2="8.21" y2="11.5" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
</svg>
